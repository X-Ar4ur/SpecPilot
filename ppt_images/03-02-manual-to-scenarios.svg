    <text class="card-body" x="30" y="194">• 按 module 聚合 chunks</text>
    <text class="card-body" x="30" y="222">• 抽取功能点 Feature</text>
    <text class="card-body" x="30" y="250">• 保留 evidence_quotes</text>
    <text class="card-body" x="47" y="274">  与 source_urls</text>
  </g>

  <g transform="translate(586 520)">
    <rect class="box-teal" width="282" height="260" />
    <circle class="teal" cx="32" cy="32" r="20" /><text class="num" x="32" y="40" text-anchor="middle">8</text>
    <text class="card-title" x="162" y="35" text-anchor="middle">阶段 2：Scenario</text>
    <text class="card-title" x="162" y="63" text-anchor="middle">Generation</text>
    <rect class="thin" x="50" y="78" width="182" height="92" />
    <text class="small" x="141" y="108" text-anchor="middle">Scenario</text>
    <path class="icon" d="M72 130 H208 M72 152 H184" />
