    <text class="card-body" x="22" y="289">• 输出 HTML / Markdown</text>
  </g>

  <g transform="translate(726 150)">
    <rect class="box" width="210" height="310" />
    <circle class="blue" cx="30" cy="30" r="19" /><text class="num" x="30" y="38" text-anchor="middle">3</text>
    <text class="card-title" x="124" y="42" text-anchor="middle">清洗与切片</text>
