    <text class="card-body" x="24" y="242">• 按 H1 / H2 / H3 切分</text>
    <text class="card-body" x="24" y="270">• 超长块递归切分</text>
  </g>

  <g transform="translate(966 150)">
    <rect class="box" width="210" height="310" />
    <circle class="blue" cx="30" cy="30" r="19" /><text class="num" x="30" y="38" text-anchor="middle">4</text>
    <text class="card-title" x="124" y="34" text-anchor="middle">Chunk</text>
    <text class="card-title" x="124" y="62" text-anchor="middle">Metadata</text>
    <rect class="thin" x="42" y="79" width="126" height="34" />
    <rect class="thin" x="42" y="120" width="126" height="34" />
    <rect class="thin" x="42" y="161" width="126" height="34" />
    <text class="small" x="105" y="101" text-anchor="middle">source_url</text>
    <text class="small" x="105" y="142" text-anchor="middle">heading_path</text>
    <text class="small" x="105" y="183" text-anchor="middle">module</text>
    <text class="card-body" x="24" y="230">• manual_section</text>
    <text class="card-body" x="24" y="258">• language</text>
    <text class="card-body" x="24" y="286">• content_hash</text>
  </g>

  <g transform="translate(1206 150)">
    <rect class="box-teal" width="210" height="310" />
    <circle class="teal" cx="30" cy="30" r="19" /><text class="num" x="30" y="38" text-anchor="middle">5</text>
    <text class="card-title" x="124" y="42" text-anchor="middle">UI 操作分类</text>
