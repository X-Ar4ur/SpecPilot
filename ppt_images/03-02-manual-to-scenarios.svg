<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1008" viewBox="0 0 1792 1008" role="img" aria-labelledby="title desc">
  <title id="title">手册知识层与场景生成层</title>
  <desc id="desc">SpecPilot 从 4ga Boards user/admin 手册到零 locator 测试场景的生成流程图</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .title { font: 800 56px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0b1f4d; }
      .subtitle { font: 600 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #31507d; }
      .lane-title { font: 800 28px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #fff; }
      .card-title { font: 800 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #09245b; }
      .card-body { font: 500 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f3357; }
      .small { font: 600 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #31507d; }
      .badge-text { font: 700 19px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #14325f; }
      .note-title { font: 800 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0b4f7a; }
      .note-body { font: 500 17px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #203a60; }
      .num { font: 800 22px Arial, sans-serif; fill: #fff; }
      .box { fill: #fff; stroke: #1f5faa; stroke-width: 2; rx: 16; }
      .box-green { fill: #fbfffb; stroke: #208a48; stroke-width: 2; rx: 16; }
      .box-teal { fill: #f7ffff; stroke: #0994a6; stroke-width: 2; rx: 16; }
      .box-amber { fill: #fffaf0; stroke: #e89119; stroke-width: 2; rx: 16; }
      .thin { fill: #fff; stroke: #7aa8e8; stroke-width: 1.5; rx: 10; }
      .pill { fill: #eef6ff; stroke: #7aa8e8; stroke-width: 1.4; rx: 18; }
      .arrow { stroke: #1f6fd1; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .arrow-teal { stroke: #0b9dac; stroke-width: 5; fill: none; marker-end: url(#arrowTeal); }
      .dash { stroke: #6f8fb8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrowSmall); }
      .icon { stroke: #1f5faa; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #dff1ff; stroke: #1f5faa; stroke-width: 3; }
      .teal { fill: #0b9dac; }
      .blue { fill: #155bb5; }
      .green { fill: #228b45; }
      .amber { fill: #e89119; }
      .red { fill: #ce3a35; }
    </style>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#1f6fd1" />
    </marker>
    <marker id="arrowTeal" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#0b9dac" />
    </marker>
    <marker id="arrowSmall" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6f8fb8" />
    </marker>
    <linearGradient id="laneBlue" x1="0" x2="1">
      <stop offset="0" stop-color="#08357f" />
      <stop offset="1" stop-color="#1263c7" />
    </linearGradient>
    <linearGradient id="laneTeal" x1="0" x2="1">
      <stop offset="0" stop-color="#087e91" />
      <stop offset="1" stop-color="#12aab9" />
    </linearGradient>
  </defs>

  <rect class="bg" width="1792" height="1008" />
  <rect x="48" y="150" width="168" height="310" rx="18" fill="url(#laneBlue)" />
