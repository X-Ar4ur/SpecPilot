    <text class="card-body" x="30" y="252">• 步骤是自然语言用户意图</text>
  </g>

  <g transform="translate(926 520)">
    <rect class="box-amber" width="282" height="260" />
    <circle class="amber" cx="32" cy="32" r="20" /><text class="num" x="32" y="40" text-anchor="middle">9</text>
    <text class="card-title" x="162" y="35" text-anchor="middle">反幻觉与</text>
    <text class="card-title" x="162" y="63" text-anchor="middle">零 locator 校验</text>
    <path class="icon" d="M141 78 L206 104 V151 C206 188 177 211 141 224 C105 211 76 188 76 151 V104 Z" />
    <path class="icon" d="M112 149 L134 171 L174 125" />
