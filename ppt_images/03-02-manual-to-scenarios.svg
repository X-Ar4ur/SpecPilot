    <circle class="blue" cx="30" cy="30" r="19" /><text class="num" x="30" y="38" text-anchor="middle">2</text>
    <text class="card-title" x="124" y="34" text-anchor="middle">Crawl4AI</text>
    <text class="card-title" x="124" y="62" text-anchor="middle">爬取</text>
