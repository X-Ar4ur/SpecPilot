    <text class="card-body" x="22" y="284">• 过滤非 UI 技术内容</text>
  </g>

  <g transform="translate(1446 150)">
    <rect class="box" width="210" height="310" />
    <circle class="blue" cx="30" cy="30" r="19" /><text class="num" x="30" y="38" text-anchor="middle">6</text>
