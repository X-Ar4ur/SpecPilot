  <path class="arrow" d="M1176 305 H1200" />
  <path class="arrow" d="M1416 305 H1440" />

  
  <g transform="translate(246 520)">
    <rect class="box-teal" width="282" height="260" />
    <circle class="teal" cx="32" cy="32" r="20" /><text class="num" x="32" y="40" text-anchor="middle">7</text>
    <text class="card-title" x="162" y="35" text-anchor="middle">阶段 1：Feature</text>
    <text class="card-title" x="162" y="63" text-anchor="middle">Extraction</text>
